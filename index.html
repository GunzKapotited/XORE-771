<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CosmicX - NXOB V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,0,0,0.2);
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 3px;
            color: #ff0000;
        }

        /* 404 Page */
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: 800;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .error-message {
            font-size: 18px;
            margin-top: 16px;
            opacity: 0.7;
        }
        .error-back {
            margin-top: 32px;
            padding: 12px 32px;
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .error-back:hover {
            background: rgba(255,0,0,0.3);
        }

        /* App Container */
        #app {
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">NXOB V2</div>
    </div>

    <div id="app"></div>

    <script>
        // ==================== PAGE COMPONENTS ====================
        // Since all pages are large, we'll use dynamic imports or load from existing files
        // For now, we'll create a router that loads pages from separate HTML files
        
        // Router Configuration
        const routes = {
            '/': 'landing.html',
            '/login': 'login.html',
            '/splash': 'splash.html',
            '/buy_account': 'buy_account.html',
            '/loader': 'dashboard.html',
            '/attack': 'attack.html',
            '/seller': 'seller.html',
            '/admin': 'admin.html',
            '/login_rat': 'device_dashboard.html',
            '/dashboard_rat': 'device_dashboard.html',
            '/control_panel': 'control_center.html'
        };
        
        // Current route state
        let currentRoute = '/';
        let routeArgs = {};
        
        // Helper Functions
        function showLoading(show) {
            const loadingScreen = document.getElementById('loadingScreen');
            if (show) {
                loadingScreen.classList.remove('hidden');
            } else {
                loadingScreen.classList.add('hidden');
            }
        }
        
        function show404() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-page">
                    <div class="error-code">404</div>
                    <div class="error-message">PANEL NOT FOUND</div>
                    <div class="error-back" onclick="navigateTo('/')">BACK TO HOME</div>
                </div>
            `;
        }
        
        async function loadPage(route, args = {}) {
            showLoading(true);
            currentRoute = route;
            routeArgs = args;
            
            // Save to localStorage for persistence
            localStorage.setItem('currentRoute', route);
            localStorage.setItem('routeArgs', JSON.stringify(args));
            
            const pageFile = routes[route];
            
            if (!pageFile) {
                showLoading(false);
                show404();
                return;
            }
            
            try {
                // Load the HTML file
                const response = await fetch(pageFile);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const html = await response.text();
                
                // Extract body content or use full HTML
                const app = document.getElementById('app');
                
                // If the fetched file is a full HTML document, extract body content
                if (html.includes('<body')) {
                    const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    if (bodyMatch && bodyMatch[1]) {
                        app.innerHTML = bodyMatch[1];
                    } else {
                        app.innerHTML = html;
                    }
                } else {
                    app.innerHTML = html;
                }
                
                // Execute any script tags in the loaded content
                const scripts = app.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
                
                showLoading(false);
            } catch (error) {
                console.error('Error loading page:', error);
                showLoading(false);
                show404();
            }
        }
        
        function navigateTo(route, args = {}) {
            // Update URL without reload
            window.history.pushState({ route, args }, '', route);
            loadPage(route, args);
        }
        
        // Handle browser back/forward buttons
        window.addEventListener('popstate', (event) => {
            const route = event.state?.route || '/';
            const args = event.state?.args || {};
            loadPage(route, args);
        });
        
        // Parse URL parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params) {
                result[key] = value;
            }
            return result;
        }
        
        // Initialize app based on URL
        function initApp() {
            // Check if there's saved route in localStorage
            const savedRoute = localStorage.getItem('currentRoute');
            const savedArgs = localStorage.getItem('routeArgs');
            
            // Get route from URL hash or path
            let initialRoute = window.location.pathname;
            
            // If root path, check saved route or default to '/'
            if (initialRoute === '/' || initialRoute === '/index.html') {
                if (savedRoute && savedRoute !== '/') {
                    initialRoute = savedRoute;
                    routeArgs = JSON.parse(savedArgs || '{}');
                } else {
                    initialRoute = '/';
                }
            }
            
            // Handle hash-based routing for compatibility
            if (window.location.hash) {
                initialRoute = window.location.hash.substring(1);
            }
            
            // Validate route exists
            if (!routes[initialRoute] && initialRoute !== '/') {
                initialRoute = '/';
            }
            
            loadPage(initialRoute, routeArgs);
        }
        
        // Export navigateTo to global scope for use in pages
        window.navigateTo = navigateTo;
        
        // Also provide a way to pass arguments when navigating
        window.navigateWithArgs = (route, args) => {
            navigateTo(route, args);
        };
        
        // For pages that need to access route arguments
        window.getRouteArgs = () => routeArgs;
        
        // Start the app
        initApp();
    </script>
</body>
</html>
