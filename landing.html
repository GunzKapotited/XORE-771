<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CosmicX - Advanced Security Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel Decorative', 'Georgia', serif;
            background: #070709;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111118; }
        ::-webkit-scrollbar-thumb { background: #D8D8F0; border-radius: 10px; }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }
        .gradient-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(216,216,240,0.05), #070709, #0C0C10);
        }
        .rotating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
        }
        .orb-1 {
            top: -60px;
            right: -80px;
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(216,216,240,0.08), rgba(144,144,176,0.03), transparent);
            animation: rotate1 20s linear infinite;
        }
        .orb-2 {
            bottom: 100px;
            left: -100px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(136,136,153,0.1), rgba(136,136,153,0.02), transparent);
            animation: rotate2 20s linear infinite reverse;
        }
        .orb-3 {
            top: 35%;
            right: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(208,208,232,0.07), transparent);
            animation: pulse 6s ease-in-out infinite;
        }
        @keyframes rotate1 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotate2 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.07; transform: scale(1); }
            50% { opacity: 0.12; transform: scale(1.05); }
        }
        .vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
            pointer-events: none;
        }

        /* Container */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(24,24,32,0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(42,42,56,0.7);
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6), 0 0 40px rgba(216,216,240,0.06);
        }

        /* Welcome Dialog */
        .welcome-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .dialog-content {
            max-width: 380px;
            width: 100%;
            background: linear-gradient(135deg, rgba(24,24,32,0.95), rgba(24,24,32,0.85));
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1.5px solid rgba(216,216,240,0.3);
            overflow: hidden;
            transform: scale(0.9);
            animation: scaleIn 0.5s ease-out forwards;
        }
        @keyframes scaleIn {
            to { transform: scale(1); }
        }
        .dialog-header {
            height: 180px;
            background: linear-gradient(135deg, #1a1a2e, #0a0a15);
            position: relative;
            overflow: hidden;
        }
        .dialog-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(24,24,32,0.95));
        }

        /* Hero Section */
        .hero-title {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #D8D8F0, #D0D0E8, #9090B0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(216,216,240,0.5);
        }
        @media (max-width: 550px) {
            .hero-title { font-size: 52px; }
        }

        /* Stats Box */
        .stat-box {
            background: rgba(20,20,28,0.7);
            border-radius: 18px;
            padding: 18px 10px;
            text-align: center;
            border: 1px solid rgba(216,216,240,0.18);
        }

        /* Feature Card */
        .feature-card {
            background: #111118;
            border-radius: 20px;
            border: 1px solid rgba(216,216,240,0.2);
            padding: 18px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: default;
        }
        .feature-card:hover { transform: translateY(-4px); }

        /* Buttons */
        .btn-primary {
            width: 100%;
            height: 62px;
            background: #D8D8F0;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(216,216,240,0.35);
        }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-secondary {
            width: 100%;
            height: 62px;
            border-radius: 16px;
            border: 1.2px solid rgba(216,216,240,0.25);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background: rgba(216,216,240,0.05); }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
        }
        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216,216,240,0.15), transparent);
            margin-bottom: 24px;
        }

        /* Utilities */
        .flex { display: flex; align-items: center; gap: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .text-center { text-align: center; }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-shadow: 0 0 7px currentColor;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(216,216,240,0.5);
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-bg"></div>
        <div class="rotating-orb orb-1"></div>
        <div class="rotating-orb orb-2"></div>
        <div class="rotating-orb orb-3"></div>
        <div class="vignette"></div>
    </div>

    <div class="app-container" id="appContainer"></div>

    <!-- Welcome Dialog -->
    <div class="welcome-dialog" id="welcomeDialog">
        <div class="dialog-content">
            <div class="dialog-header">
                <div style="position: absolute; bottom: 20px; left: 20px; display: flex; align-items: center; gap: 12px;">
                    <div style="padding: 8px; background: rgba(216,216,240,0.1); border-radius: 12px;">
                        <i class="fas fa-hand-peace" style="color: #D8D8F0; font-size: 24px;"></i>
                    </div>
                    <div style="font-size: 18px; font-weight: 900; letter-spacing: 3px; color: #D8D8F0;">WELCOME BACK</div>
                </div>
            </div>
            <div style="padding: 28px;">
                <div style="font-size: 16px; font-weight: 700; color: #9AAAB8; text-align: center;">Mantapp!!, akses udaaa bener nihhh</div>
                <div style="font-size: 14px; font-weight: 600; opacity: 0.7; text-align: center; margin-top: 12px;">Nau langsung lanjut?</div>
                <div class="flex" style="margin-top: 28px; gap: 16px;">
                    <div style="flex: 1; padding: 14px; background: rgba(187,136,153,0.1); border-radius: 16px; text-align: center; cursor: pointer; border: 1px solid rgba(187,136,153,0.3);" onclick="closeWelcomeDialog()">
                        <i class="fas fa-times" style="color: #BB8899;"></i>
                        <span style="margin-left: 10px; font-weight: 800;">BATAL</span>
                    </div>
                    <div style="flex: 1; padding: 14px; background: linear-gradient(135deg, #D8D8F0, #9090B0); border-radius: 16px; text-align: center; cursor: pointer;" onclick="closeWelcomeDialog()">
                        <span style="font-weight: 900; letter-spacing: 2px; color: #070709;">LANJUTKAN</span>
                        <i class="fas fa-arrow-right" style="margin-left: 10px; color: #070709;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Animation State
        let fadeInElements = [];
        
        // Helper Functions
        function closeWelcomeDialog() {
            document.getElementById('welcomeDialog').style.display = 'none';
        }
        
        function openLoginPage() {
            window.location.href = '/login.html';
        }
        
        function openTelegram() {
            window.open('https://t.me/CosmicXArea', '_blank');
        }
        
        // Intersection Observer for scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);
        
        // Render Main Page
        function renderPage() {
            const features = [
                { icon: 'fa-shield-halved', title: 'SECURITY', desc: 'Account Protection', color: '#D8D8F0' },
                { icon: 'fa-robot', title: 'CRASH WA', desc: 'Real Time Bugs', color: '#9090B0' },
                { icon: 'fa-clock', title: '24/7 ACTIVE', desc: 'Always Online', color: '#D0D0E8' },
                { icon: 'fa-lock', title: 'SPYWARE', desc: 'Device Monitoring', color: '#BBBBD0' }
            ];
            
            const stats = [
                { value: '99.99%', label: 'UPTIME', icon: 'fa-chart-line', color: '#D8D8F0' },
                { value: '24/7', label: 'SUPPORT', icon: 'fa-headset', color: '#9090B0' },
                { value: '150+', label: 'USERS', icon: 'fa-users', color: '#D0D0E8' }
            ];
            
            document.getElementById('appContainer').innerHTML = `
                <!-- Hero Section -->
                <div class="fade-item" style="opacity: 0; transform: translateY(20px); transition: all 0.6s ease;">
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <div style="padding: 7px 14px; background: rgba(216,216,240,0.06); border-radius: 8px; border: 1px solid rgba(216,216,240,0.18);">
                            <span style="font-size: 10px; font-weight: 700;">v4.0</span>
                        </div>
                        <div class="flex">
                            <div style="width: 7px; height: 7px; border-radius: 50%; background: #9AAAB8; box-shadow: 0 0 10px #9AAAB8;"></div>
                            <span style="font-size: 9px; font-weight: 700;">ONLINE</span>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div style="font-size: 130px; font-weight: 900; opacity: 0.04; position: absolute; top: -18px; left: -8px;">SUN</div>
                        <div class="hero-title">CosmicX</div>
                        <div class="flex" style="margin-top: 4px;">
                            <div style="width: 32px; height: 1.5px; background: rgba(144,144,176,0.5);"></div>
                            <span style="font-size: 10px; font-weight: 600; opacity: 0.7;">PREMIUM SECURITY PLATFORM</span>
                        </div>
                    </div>
                    
                    <div class="flex" style="margin-top: 36px;">
                        <div style="width: 80px; height: 80px; border-radius: 50%; background: #14141C; border: 1.5px solid rgba(216,216,240,0.25); display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite;">
                            <i class="fas fa-shield-halved" style="color: #D8D8F0; font-size: 34px;"></i>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 18px; font-weight: 800;">ADVANCED</div>
                            <div style="font-size: 12px; font-weight: 600; opacity: 0.55;">PROTECTION SUITE</div>
                            <div style="margin-top: 10px; position: relative;">
                                <div style="height: 3px; background: rgba(216,216,240,0.07); border-radius: 4px;"></div>
                                <div style="width: 120px; height: 3px; background: linear-gradient(90deg, #D8D8F0, rgba(144,144,176,0.2)); border-radius: 4px; position: absolute; top: 0;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Stats Row -->
                <div class="flex" style="margin: 36px 0; gap: 10px;">
                    ${stats.map((stat, idx) => `
                        <div class="stat-box fade-item" style="flex: 1; opacity: 0; transform: translateY(20px); transition: all 0.5s ease ${idx * 0.1}s;">
                            <i class="fas ${stat.icon}" style="color: ${stat.color}; opacity: 0.6; font-size: 16px;"></i>
                            <div style="font-size: 24px; font-weight: 800; color: ${stat.color}; margin-top: 10px; text-shadow: 0 0 16px ${stat.color};">${stat.value}</div>
                            <div style="font-size: 9px; font-weight: 700; opacity: 0.35;">${stat.label}</div>
                        </div>
                    `).join('')}
                </div>
                
                <!-- Core Features -->
                <div class="fade-item" style="opacity: 0; transform: translateY(20px); transition: all 0.5s ease 0.3s;">
                    <div class="flex" style="margin-bottom: 18px;">
                        <div style="width: 4px; height: 20px; background: #D8D8F0; border-radius: 2px; box-shadow: 0 0 8px #D8D8F0;"></div>
                        <span style="font-size: 13px; font-weight: 800;">CORE FEATURES</span>
                    </div>
                    <div class="flex" style="flex-wrap: wrap; gap: 12px;">
                        ${features.map((feat, idx) => `
                            <div class="feature-card fade-item" style="flex: 1; min-width: calc(50% - 6px); opacity: 0; transform: translateY(20px); transition: all 0.5s ease ${0.4 + idx * 0.1}s;">
                                <div style="position: absolute; top: -10px; right: -10px; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, ${feat.color}20, transparent);"></div>
                                <i class="fas ${feat.icon}" style="color: ${feat.color}; font-size: 26px; opacity: 0.85;"></i>
                                <div style="font-weight: 800; font-size: 12px; margin-top: 14px;">${feat.title}</div>
                                <div style="font-size: 9px; font-weight: 500; opacity: 0.35;">${feat.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- Testimonial Card -->
                <div class="glass-card fade-item" style="margin: 28px 0; padding: 24px; opacity: 0; transform: translateY(20px); transition: all 0.5s ease 0.6s;">
                    <div class="flex-between">
                        <div class="flex">
                            ${Array(5).fill(0).map(() => '<i class="fas fa-star" style="color: #C8C0A0; opacity: 0.7; font-size: 12px;"></i>').join('')}
                        </div>
                        <i class="fas fa-quote-right" style="color: rgba(216,216,240,0.25); font-size: 28px;"></i>
                    </div>
                    <p style="margin: 16px 0; font-size: 13px; font-weight: 500; opacity: 0.75;">Best security platform I've ever used. The protection is top-notch and the interface is incredibly smooth.</p>
                    <div class="flex">
                        <div style="width: 42px; height: 42px; border-radius: 50%; background: #14141C; border: 1.2px solid rgba(216,216,240,0.2); display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user" style="color: #D8D8F0; font-size: 20px;"></i>
                        </div>
                        <div>
                            <div style="font-weight: 700; font-size: 13px;">t.me/tzynotdev</div>
                            <div style="font-size: 10px; opacity: 0.35;">Lead Developer</div>
                        </div>
                    </div>
                </div>
                
                <!-- Buttons -->
                <div class="btn-primary fade-item" style="opacity: 0; transform: translateY(20px); transition: all 0.5s ease 0.7s;" onclick="openLoginPage()">
                    <span style="font-weight: 800; font-size: 14px; letter-spacing: 2px; color: #070709;">GET STARTED</span>
                    <div style="width: 30px; height: 30px; background: rgba(7,7,9,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-arrow-right" style="color: #070709; font-size: 14px;"></i>
                    </div>
                </div>
                
                <div class="btn-secondary fade-item" style="margin-top: 14px; opacity: 0; transform: translateY(20px); transition: all 0.5s ease 0.8s;" onclick="openTelegram()">
                    <div style="padding: 7px; background: rgba(216,216,240,0.1); border-radius: 8px;">
                        <i class="fab fa-telegram-plane" style="color: #D8D8F0; font-size: 14px;"></i>
                    </div>
                    <span style="font-weight: 700; font-size: 13px;">JOIN COMMUNITY</span>
                </div>
                
                <!-- Footer -->
                <div class="footer fade-item" style="opacity: 0; transform: translateY(20px); transition: all 0.5s ease 0.9s;">
                    <div class="footer-divider"></div>
                    <div class="flex" style="justify-content: center; gap: 20px; margin-bottom: 20px;">
                        <div class="flex"><div class="status-dot" style="background: #9AAAB8;"></div><span style="font-size: 9px; font-weight: 700; opacity: 0.3;">SECURE</span></div>
                        <div class="flex"><div class="status-dot" style="background: #D0D0E8;"></div><span style="font-size: 9px; font-weight: 700; opacity: 0.3;">ENCRYPTED</span></div>
                        <div class="flex"><div class="status-dot" style="background: #D8D8F0;"></div><span style="font-size: 9px; font-weight: 700; opacity: 0.3;">AUDITED</span></div>
                    </div>
                    <div style="font-size: 9px; font-weight: 600; opacity: 0.12;">CosmicX v4.0 • ADVANCED SECURITY</div>
                    <div style="font-size: 8px; font-weight: 600; opacity: 0.07; margin-top: 6px;">© 2025 CosmicX Security. All rights reserved.</div>
                </div>
            `;
            
            // Observe fade items
            document.querySelectorAll('.fade-item').forEach(el => {
                observer.observe(el);
            });
        }
        
        // Add CSS for visible class
        const style = document.createElement('style');
        style.textContent = `
            .fade-item.visible {
                opacity: 1 !important;
                transform: translateY(0) !important;
            }
        `;
        document.head.appendChild(style);
        
        // Initialize
        renderPage();
        
        // Auto-close welcome dialog after 5 seconds? No, let user decide
        // But we can add click outside to close
        document.getElementById('welcomeDialog').addEventListener('click', function(e) {
            if (e.target === this) {
                closeWelcomeDialog();
            }
        });
    </script>
</body>
</html>
