name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          [ -z "$ZIP_FILE" ] && echo "No ZIP" && exit 1
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Fix semua error di pubspec.yaml
        run: |
          # Hapus seluruh bagian flutter_launcher_icons
          sed -i '/^flutter_launcher_icons:/,/^[a-z]/d' pubspec.yaml
          # Hapus baris yang mengandung android: true
          sed -i '/android: true/d' pubspec.yaml
          sed -i '/ios: true/d' pubspec.yaml
          # Hapus youtube_player_flutter
          sed -i '/youtube_player_flutter:/d' pubspec.yaml
          echo "✅ pubspec.yaml sudah dibersihkan"
          cat pubspec.yaml | head -50
      
      - name: Create dummy assets
        run: |
          mkdir -p assets/icon
          touch assets/icon/icon.jpg
      
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
