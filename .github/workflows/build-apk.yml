name: Build APK like VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04  # Pake Ubuntu versi lama kayak VPS kebanyakan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No ZIP file found"
            exit 1
          fi
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"
          ls -la
      
      - name: Setup Java (OpenJDK 11 kayak VPS)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk
          java -version
      
      - name: Setup Flutter (stable terbaru)
        run: |
          cd $HOME
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.16.9-stable.tar.xz
          tar -xf flutter_linux_3.16.9-stable.tar.xz
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          flutter precache
      
      - name: Build APK
        run: |
          flutter doctor
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
