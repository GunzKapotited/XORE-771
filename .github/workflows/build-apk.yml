name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP file
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ Tidak ada file ZIP!"
            exit 1
          fi
          echo "📦 Extracting $ZIP_FILE..."
          unzip -o -q "$ZIP_FILE"
          rm -f "$ZIP_FILE"
          echo "✅ Extract selesai!"
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Create missing assets
        run: |
          mkdir -p assets/images assets/videos assets/icon fonts 2>/dev/null || true
          find assets -name "*.png" -exec touch {} \; 2>/dev/null || true
          find assets -name "*.jpg" -exec touch {} \; 2>/dev/null || true
          find assets -name "*.mp4" -exec touch {} \; 2>/dev/null || true
          find fonts -name "*.ttf" -exec touch {} \; 2>/dev/null || true
      
      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
