name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP file
        run: |
          # Cari file ZIP di repository
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ Tidak ada file ZIP ditemukan!"
            echo "📦 Upload file ZIP project Flutter kamu"
            exit 1
          fi
          
          echo "📦 Meng-extract file: $ZIP_FILE"
          unzip -q "$ZIP_FILE"
          
          # Hapus ZIP setelah extract
          rm "$ZIP_FILE"
          
          echo "✅ Extract selesai!"
          ls -la
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
