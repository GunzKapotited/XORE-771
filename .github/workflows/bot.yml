name: Bot 24/7 UNLIMITED LIMITS

on:
  schedule:
    - cron: '*/120 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup RAM 8GB
        run: |
          # Setup RAM 8GB
          echo "=== Setting RAM to 8GB ==="
          sudo mount -o remount,exec,size=8G /dev/shm 2>/dev/null || true
          
          # Buat swap 8GB
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          # Optimasi swap
          sudo sysctl vm.swappiness=10
          sudo sysctl vm.vfs_cache_pressure=50
          
          # Tampilkan RAM
          echo "=== RAM Configuration ==="
          free -h
          df -h /dev/shm 2>/dev/null || true
          
      - name: Tampilkan IP, Username Root, dan Password Root
        run: |
          echo "=========================================="
          echo "========== SERVER INFORMATION =========="
          echo "=========================================="
          
          # Tampilkan IP Public
          echo ""
          echo "[IP Address Information]"
          echo "------------------------"
          PUBLIC_IP=$(curl -s --max-time 10 https://api.ipify.org)
          echo "Public IP: $PUBLIC_IP"
          
          # Alternatif IP dari service lain
          IPV4=$(curl -s --max-time 10 https://ipv4.icanhazip.com)
          echo "IPv4: $IPV4"
          
          # Tampilkan IP lokal
          LOCAL_IP=$(hostname -I | awk '{print $1}')
          echo "Local IP: $LOCAL_IP"
          
          # Tampilkan semua IP
          echo ""
          echo "All Network Interfaces:"
          ip addr show | grep -E "inet " | awk '{print $2}' || true
          
          # Tampilkan username root
          echo ""
          echo "[User Information]"
          echo "------------------"
          echo "Username Root: root"
          echo "Current User: $(whoami)"
          echo "User ID: $(id)"
          
          # Generate password root (random untuk session ini)
          echo ""
          echo "[Password Information]"
          echo "----------------------"
          ROOT_PASSWORD=$(openssl rand -base64 32 | head -c 20)
          echo "Root Password: $ROOT_PASSWORD"
          echo "Password length: 20 characters"
          
          # Set password root (hanya untuk session ini)
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          
          # Enable root login via password
          sudo sed -i 's/^#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null || true
          sudo sed -i 's/^PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null || true
          sudo sed -i 's/^PermitRootLogin no/PermitRootLogin yes/' /etc/ssh/sshd_config 2>/dev/null || true
          
          # Restart SSH service
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null || echo "SSH service restart not needed"
          
          # Tampilkan informasi akses
          echo ""
          echo "[SSH Access Information]"
          echo "------------------------"
          echo "SSH Command: ssh root@$PUBLIC_IP"
          echo "Password: $ROOT_PASSWORD"
          echo "Port: 22"
          
          # Tampilkan informasi sistem
          echo ""
          echo "[System Information]"
          echo "--------------------"
          echo "Hostname: $(hostname)"
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          
          # Tampilkan resource usage
          echo ""
          echo "[Resource Usage]"
          echo "----------------"
          echo "CPU Cores: $(nproc)"
          free -h
          df -h /
          
          echo ""
          echo "=========================================="
          echo "=== SAVE THIS INFORMATION FOR ACCESS ==="
          echo "=========================================="
          
          # Simpan ke file untuk referensi
          cat > access_info.txt << EOF
====================================
SERVER ACCESS INFORMATION
====================================
Public IP: $PUBLIC_IP
Local IP: $LOCAL_IP
Username: root
Password: $ROOT_PASSWORD
SSH Command: ssh root@$PUBLIC_IP
Port: 22
====================================
EOF
          
          echo "Access information saved to access_info.txt"
          cat access_info.txt
          
      - name: Unzip file
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              unzip -o "$zipfile"
              rm -f "$zipfile"
            fi
          done
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true
      
      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund || true
          
      - name: Download Cloudflared
        run: |
          curl -L -s --max-time 30 https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          
      - name: Jalankan Bot Forever (Tanpa Membuat Action Baru)
        run: |
          # Tampilkan akses info lagi sebelum bot jalan
          echo "=== SERVER ACCESS READY ==="
          if [ -f access_info.txt ]; then
            cat access_info.txt
          fi
          echo ""
          echo "You can SSH to this server using:"
          CURRENT_IP=$(curl -s --max-time 5 https://api.ipify.org)
          echo "ssh root@$CURRENT_IP"
          echo ""
          echo "=== BOT WILL RUN FOREVER IN THIS WORKFLOW ==="
          echo "No new GitHub Actions will be created"
          echo ""
          
          # Set RAM limit untuk Node.js
          export NODE_OPTIONS="--max-old-space-size=7168 --max-semi-space-size=128 --initial-old-space-size=1024 --expose-gc"
          
          # Hapus environment variables GitHub
          unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
          unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
          unset GITHUB_HEAD_REF GITHUB_BASE_REF GITHUB_SERVER_URL
          unset GITHUB_API_URL GITHUB_GRAPHQL_URL GITHUB_REF GITHUB_SHA GITHUB_WORKSPACE
          unset GITHUB_PATH GITHUB_ENV GITHUB_STATE GITHUB_OUTPUT
          
          export USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "=== Starting Bot with 8GB RAM ==="
          free -h
          
          # Buat script keepalive untuk mencegah timeout
          cat > keepalive.sh << 'KEEPALIVE'
          #!/bin/bash
          # Keepalive script to prevent GitHub Actions timeout
          while true; do
              echo "[$(date)] 🟢 Bot is still running normally..."
              echo "[$(date)] Memory: $(free -h | grep Mem | awk '{print $3"/"$2}')"
              echo "[$(date)] Uptime: $(uptime -p)"
              echo "-----------------------------------"
              sleep 3000
          done
          KEEPALIVE
          
          chmod +x keepalive.sh
          
          # Function untuk cleanup
          cleanup() {
              echo "[$(date)] Cleaning up processes..."
              kill $NODE_PID $TUNNEL_PID $KEEPALIVE_PID 2>/dev/null
              exit 0
          }
          
          trap cleanup SIGTERM SIGINT
          
          # Function cek koneksi
          check_internet() {
              curl -s --max-time 5 https://1.1.1.1 > /dev/null 2>&1
              return $?
          }
          
          # Jalankan keepalive di background
          ./keepalive.sh &
          KEEPALIVE_PID=$!
          
          # Variabel monitoring
          RESTART_COUNT=0
          RAM_RESTART_COUNT=0
          FAIL_COUNT=0
          TOTAL_RUNTIME=0
          
          while true; do
              # Cek koneksi internet
              if ! check_internet; then
                  echo "[$(date)] No internet connection, waiting 30 seconds..."
                  sleep 30
                  continue
              fi
              
              # Log RAM sebelum start
              echo "[$(date)] ======================================"
              echo "[$(date)] Starting Bot Instance (Restart #$RESTART_COUNT)"
              echo "[$(date)] Total runtime so far: $((TOTAL_RUNTIME / 3600)) hours"
              echo "[$(date)] ======================================"
              free -h
              
              # Jalankan node dengan nice priority
              nice -n 10 node --expose-gc --max-old-space-size=7168 index.js 2>&1 &
              NODE_PID=$!
              
              # Jalankan tunnel dengan nice priority
              nice -n 10 ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 2>&1 &
              TUNNEL_PID=$!
              
              echo "[$(date)] Processes started - Node: $NODE_PID, Tunnel: $TUNNEL_PID"
              echo "[$(date)] This workflow will continue running, no new action will be created"
              
              # Monitoring loop
              RUN_TIME=0
              while true; do
                  sleep 60
                  RUN_TIME=$((RUN_TIME + 60))
                  TOTAL_RUNTIME=$((TOTAL_RUNTIME + 60))
                  
                  # Cek apakah proses masih hidup
                  if ! kill -0 $NODE_PID 2>/dev/null; then
                      echo "[$(date)] ❌ Node process died!"
                      FAIL_COUNT=$((FAIL_COUNT + 1))
                      break
                  fi
                  
                  if ! kill -0 $TUNNEL_PID 2>/dev/null; then
                      echo "[$(date)] ❌ Tunnel died, restarting..."
                      kill $TUNNEL_PID 2>/dev/null
                      sleep 5
                      nice -n 10 ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 2>&1 &
                      TUNNEL_PID=$!
                      echo "[$(date)] ✅ Tunnel restarted with PID: $TUNNEL_PID"
                  fi
                  
                  # Monitor RAM setiap 5 menit
                  if [ $((RUN_TIME % 300)) -eq 0 ]; then
                      RAM_USED=$(free -m | awk '/^Mem:/{print $3}')
                      RAM_TOTAL=$(free -m | awk '/^Mem:/{print $2}')
                      if [ -n "$RAM_TOTAL" ] && [ $RAM_TOTAL -gt 0 ]; then
                        RAM_PERCENT=$((RAM_USED * 100 / RAM_TOTAL))
                      else
                        RAM_PERCENT=0
                      fi
                      
                      echo "[$(date)] 📊 RAM Usage: ${RAM_USED}MB / ${RAM_TOTAL}MB (${RAM_PERCENT}%)"
                      
                      if [ -n "$RAM_USED" ] && [ "$RAM_USED" -gt 7168 ] 2>/dev/null; then
                          echo "[$(date)] ⚠️ WARNING: RAM over limit! (${RAM_USED}MB > 7168MB)"
                          RAM_RESTART_COUNT=$((RAM_RESTART_COUNT + 1))
                          break
                      fi
                      
                      if [ -n "$RAM_USED" ] && [ "$RAM_USED" -gt 6144 ] 2>/dev/null; then
                          echo "[$(date)] 🔄 RAM high (${RAM_USED}MB), forcing garbage collection..."
                          kill -USR2 $NODE_PID 2>/dev/null
                      fi
                  fi
                  
                  # Periodic restart setiap 2 jam
                  if [ $RUN_TIME -ge 7200 ]; then
                      echo "[$(date)] 🔄 Periodic restart after 2 hours"
                      break
                  fi
                  
                  # Health check setiap 15 menit
                  if [ $((RUN_TIME % 900)) -eq 0 ]; then
                      echo "[$(date)] ✅ Health check OK"
                      echo "[$(date)] - Running: $((RUN_TIME / 60)) minutes"
                      echo "[$(date)] - Total restarts: $RESTART_COUNT"
                      echo "[$(date)] - RAM restarts: $RAM_RESTART_COUNT"
                      echo "[$(date)] - Failures: $FAIL_COUNT"
                      echo "[$(date)] - Total runtime: $((TOTAL_RUNTIME / 3600)) hours"
                  fi
              done
              
              # Matikan semua proses
              echo "[$(date)] Stopping processes..."
              kill $NODE_PID $TUNNEL_PID 2>/dev/null
              wait $NODE_PID $TUNNEL_PID 2>/dev/null
              
              # Bersihkan cache RAM
              sync
              echo 3 | sudo tee /proc/sys/vm/drop_caches 2>/dev/null || true
              
              RESTART_COUNT=$((RESTART_COUNT + 1))
              
              # Delay dengan backoff
              if [ $FAIL_COUNT -gt 5 ]; then
                  echo "[$(date)] ⚠️ Too many failures ($FAIL_COUNT), backing off 120 seconds..."
                  sleep 120
                  FAIL_COUNT=0
              fi
              
              if [ $RAM_RESTART_COUNT -gt 3 ]; then
                  echo "[$(date)] ⚠️ Too many RAM restarts ($RAM_RESTART_COUNT), backing off 60 seconds..."
                  sleep 60
                  RAM_RESTART_COUNT=0
              fi
              
              SLEEP_TIME=$((10 + RANDOM % 20))
              echo "[$(date)] 🔄 Restarting bot in ${SLEEP_TIME} seconds..."
              echo "[$(date)] Total restarts so far: $RESTART_COUNT"
              echo "[$(date)] No new GitHub Action will be created - this workflow continues"
              sleep $SLEEP_TIME
          done
