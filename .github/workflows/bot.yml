name: Bot 24/7 UNLIMITED LIMITS

on:
  schedule:
    - cron: '*/120 * * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip file
        run: |
          for zipfile in *.zip; do
            [ -f "$zipfile" ] && unzip -o "$zipfile" && rm -f "$zipfile"
          done
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          check-latest: true
      
      - run: npm install
      
      - name: Download Cloudflared
        run: |
          curl -L -s https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
      
      - name: Jalankan Bot (Anti Limit)
        run: |
          while true; do
            # Hapus semua jejak CI environment
            unset CI
            unset GITHUB_ACTIONS
            unset GITHUB_RUN_ID
            unset GITHUB_ACTION
            unset GITHUB_ACTOR
            unset GITHUB_REPOSITORY
            unset GITHUB_EVENT_NAME
            unset GITHUB_WORKFLOW
            unset GITHUB_HEAD_REF
            unset GITHUB_BASE_REF
            unset GITHUB_SERVER_URL
            unset GITHUB_API_URL
            unset GITHUB_GRAPHQL_URL
            unset GITHUB_REF
            unset GITHUB_SHA
            unset GITHUB_WORKSPACE
            
            # Set user agent palsu
            export USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            
            echo "[$(date)] Memulai bot..."
            node index.js &
            NODE_PID=$!
            
            ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
            TUNNEL_PID=$!
            
            # Delay acak antara 45-75 menit (tidak fixed)
            WAIT_TIME=$(( 2700 + RANDOM % 1800 ))
            echo "[$(date)] Bot berjalan, restart dalam $((WAIT_TIME/60)) menit"
            sleep $WAIT_TIME
            
            # Matikan proses
            kill $NODE_PID $TUNNEL_PID 2>/dev/null
            
            # Jeda acak sebelum restart (5-30 detik)
            SLEEP_TIME=$(( 5 + RANDOM % 25 ))
            sleep $SLEEP_TIME
          done
