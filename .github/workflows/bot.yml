name: Bot 24/7 ULTRA SPEED - Global Optimization

on:
  workflow_dispatch:
  schedule:
    - cron: '*/59 * * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999999
    
    steps:
      - uses: actions/checkout@v4
      
      # ============================================
      # 🚀 OPTIMASI GLOBAL - SEMUA SCRIPT KENA
      # ============================================
      - name: 🚀 Global Speed Optimization for ALL Scripts
        run: |
          echo "=========================================="
          echo "  🌐 OPTIMASI GLOBAL UNTUK SEMUA SCRIPT  🌐"
          echo "=========================================="
          
          # Install tools
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            speedtest-cli aria2 axel wget curl \
            net-tools dnsutils bc parallel pigz \
            ethtool mtr netcat-openbsd \
            iperf3 httpie openssl \
            nethogs htop iftop \
            p7zip-full unrar-free || true
          
          # ============================================
          # OPTIMASI SYSTEM LEVEL - SEMUA APLIKASI KENA
          # ============================================
          
          # 1. TCP Optimization - GLOBAL
          sudo sysctl -w net.core.rmem_max=536870912
          sudo sysctl -w net.core.wmem_max=536870912
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 536870912"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 536870912"
          sudo sysctl -w net.core.netdev_max_backlog=20000
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.ipv4.tcp_fastopen=3
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_fin_timeout=15
          sudo sysctl -w net.ipv4.tcp_slow_start_after_idle=0
          sudo sysctl -w net.ipv4.tcp_notsent_lowat=16384
          sudo sysctl -w net.ipv4.tcp_mtu_probing=1
          sudo sysctl -w net.core.somaxconn=65535
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          sudo sysctl -w net.ipv4.tcp_syncookies=0
          sudo sysctl -w net.ipv4.tcp_abort_on_overflow=0
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=8192
          sudo sysctl -w net.core.rmem_default=262144
          sudo sysctl -w net.core.wmem_default=262144
          
          # 2. DNS Global - SEMUA APLIKASI PAKAI INI
          sudo tee /etc/resolv.conf << 'DNS'
          nameserver 1.1.1.1
          nameserver 1.0.0.1
          nameserver 8.8.8.8
          nameserver 8.8.4.4
          nameserver 9.9.9.9
          nameserver 208.67.222.222
          nameserver 208.67.220.220
          options timeout:1 attempts:2 rotate
          DNS
          
          # 3. Disable IPv6 - GLOBAL
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1
          
          # 4. Network Interface Optimization
          for iface in $(ip link show | grep -E '^[0-9]+:' | awk -F': ' '{print $2}' | grep -v lo); do
            sudo ethtool -K $iface tso on gso on gro on lro on tx on rx on 2>/dev/null || true
            sudo ethtool -G $iface rx 4096 tx 4096 2>/dev/null || true
            sudo ip link set dev $iface mtu 9000 2>/dev/null || true
            sudo ethtool -A $iface rx on tx on 2>/dev/null || true
            sudo ethtool -C $iface rx-usecs 100 tx-usecs 100 2>/dev/null || true
          done
          
          # 5. File System Optimization - CEPAT
          sudo sysctl -w vm.swappiness=5
          sudo sysctl -w vm.vfs_cache_pressure=30
          sudo sysctl -w vm.dirty_ratio=15
          sudo sysctl -w vm.dirty_background_ratio=5
          sudo sysctl -w vm.dirty_writeback_centisecs=100
          sudo sysctl -w vm.dirty_expire_centisecs=200
          sudo sysctl -w fs.inotify.max_user_watches=524288
          sudo sysctl -w fs.inotify.max_user_instances=8192
          sudo sysctl -w fs.inotify.max_queued_events=32768
          sudo sysctl -w kernel.pid_max=65536
          sudo sysctl -w kernel.threads-max=65536
          
          # 6. Setup Swap BESAR
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /swapfile2 2>/dev/null || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress 2>/dev/null
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=4096 status=progress 2>/dev/null
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          
          # 7. Setup RAM Disk untuk cache
          sudo mkdir -p /mnt/cache /mnt/temp /mnt/downloads
          sudo mount -t tmpfs -o size=16G tmpfs /mnt/cache 2>/dev/null || true
          sudo mount -t tmpfs -o size=8G tmpfs /mnt/temp 2>/dev/null || true
          sudo mount -t tmpfs -o size=32G tmpfs /dev/shm 2>/dev/null || true
          
          # 8. CPU Governor - Performance
          sudo apt-get install -y -qq cpufrequtils 2>/dev/null || true
          echo 'GOVERNOR="performance"' | sudo tee /etc/default/cpufrequtils 2>/dev/null
          sudo systemctl restart cpufrequtils 2>/dev/null || true
          sudo cpufreq-set -g performance 2>/dev/null || true
          
          # ============================================
          # WRAPPER UNTUK WGET/CURL - SEMUA SCRIPT KENA
          # ============================================
          
          # Backup original
          sudo mv /usr/bin/wget /usr/bin/wget.original 2>/dev/null || true
          sudo mv /usr/bin/curl /usr/bin/curl.original 2>/dev/null || true
          
          # Create Wrapper WGET - SPEED MAKSIMAL
          sudo tee /usr/bin/wget << 'WGETWRAP'
          #!/bin/bash
          # WGET WRAPPER - SPEED 200+ Mbps
          ARGS=()
          SPEED_LIMIT="200M"
          
          # Parse arguments
          for arg in "$@"; do
            if [[ "$arg" == --limit-rate=* ]]; then
              # Override speed limit ke maksimal
              ARGS+=("--limit-rate=200M")
            elif [[ "$arg" == -O ]] || [[ "$arg" == --output-document=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -o ]] || [[ "$arg" == --output-file=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -c ]] || [[ "$arg" == --continue ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -q ]] || [[ "$arg" == --quiet ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -nv ]] || [[ "$arg" == --no-verbose ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -T* ]] || [[ "$arg" == --timeout=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -t* ]] || [[ "$arg" == --tries=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -P ]] || [[ "$arg" == --directory-prefix=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -N ]] || [[ "$arg" == --timestamping ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == --header=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == --user-agent=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == --post-data=* ]] || [[ "$arg" == --post-file=* ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == --no-check-certificate ]]; then
              ARGS+=("$arg")
            else
              ARGS+=("$arg")
            fi
          done
          
          # Pastikan selalu ada limit rate
          if [[ ! " ${ARGS[@]} " =~ " --limit-rate=" ]]; then
            ARGS+=("--limit-rate=200M")
          fi
          
          # Tambahkan optimasi
          ARGS+=("--tries=3")
          ARGS+=("--timeout=60")
          ARGS+=("--dns-timeout=5")
          ARGS+=("--connect-timeout=10")
          ARGS+=("--read-timeout=30")
          
          # Jalankan wget original dengan args
          /usr/bin/wget.original "${ARGS[@]}"
          WGETWRAP
          
          sudo chmod +x /usr/bin/wget
          
          # Create WRAPPER CURL - SPEED MAKSIMAL
          sudo tee /usr/bin/curl << 'CURLWRAP'
          #!/bin/bash
          # CURL WRAPPER - SPEED 200+ Mbps
          ARGS=()
          HAS_LIMIT=false
          
          for arg in "$@"; do
            if [[ "$arg" == --limit-rate* ]]; then
              ARGS+=("--limit-rate 200M")
              HAS_LIMIT=true
            elif [[ "$arg" == -o ]] || [[ "$arg" == --output ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -O ]] || [[ "$arg" == --remote-name ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -L ]] || [[ "$arg" == --location ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -s ]] || [[ "$arg" == --silent ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == --progress-bar ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -C ]] || [[ "$arg" == --continue-at ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -H ]] || [[ "$arg" == --header ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -A ]] || [[ "$arg" == --user-agent ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -d ]] || [[ "$arg" == --data ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -F ]] || [[ "$arg" == --form ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -X ]] || [[ "$arg" == --request ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -b ]] || [[ "$arg" == --cookie ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -c ]] || [[ "$arg" == --cookie-jar ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -k ]] || [[ "$arg" == --insecure ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -v ]] || [[ "$arg" == --verbose ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -I ]] || [[ "$arg" == --head ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -u ]] || [[ "$arg" == --user ]]; then
              ARGS+=("$arg")
            elif [[ "$arg" == -x ]] || [[ "$arg" == --proxy ]]; then
              ARGS+=("$arg")
            else
              ARGS+=("$arg")
            fi
          done
          
          if [[ "$HAS_LIMIT" == false ]]; then
            ARGS+=("--limit-rate 200M")
          fi
          
          # Tambahkan optimasi
          ARGS+=("--connect-timeout 30")
          ARGS+=("--max-time 600")
          ARGS+=("--retry 3")
          ARGS+=("--retry-delay 2")
          ARGS+=("--retry-max-time 60")
          ARGS+=("--speed-time 10")
          ARGS+=("--speed-limit 1")
          
          /usr/bin/curl.original "${ARGS[@]}"
          CURLWRAP
          
          sudo chmod +x /usr/bin/curl
          
          # ============================================
          # SET ENVIRONMENT VARIABLES - SEMUA SCRIPT KENA
          # ============================================
          
          cat >> ~/.bashrc << 'BASHRC'
          # Speed Optimization - Global
          export SPEED_LIMIT="200M"
          export DOWNLOAD_SPEED="200M"
          export UPLOAD_SPEED="200M"
          export MAX_THREADS="32"
          export NETWORK_OPTIMIZED="true"
          export HTTP_PROXY=""
          export HTTPS_PROXY=""
          export NODE_OPTIONS="--max-old-space-size=24576 --max-semi-space-size=2048"
          export UV_THREADPOOL_SIZE=128
          export NPM_CONFIG_REGISTRY="https://registry.npmjs.org"
          export NPM_CONFIG_CACHE="/mnt/cache/npm"
          export NPM_CONFIG_MAXSOCKETS=50
          export NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=20000
          export NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=120000
          export NPM_CONFIG_FETCH_RETRIES=5
          export NPM_CONFIG_STRICT_SSL=false
          export NPM_CONFIG_AUDIT=false
          export NPM_CONFIG_FUND=false
          
          # Aria2 config
          export ARIA2_THREADS=32
          export ARIA2_SPLIT=32
          export ARIA2_MIN_SPLIT_SIZE="1M"
          export ARIA2_MAX_DOWNLOAD_LIMIT="0"
          
          # Axel config
          export AXEL_NUM_CONNECTIONS=20
          
          # Wget config
          export WGET_LIMIT_RATE="200M"
          export WGET_TIMEOUT=60
          export WGET_TRIES=3
          
          alias wget='wget --limit-rate=200M --tries=3 --timeout=60'
          alias curl='curl --limit-rate 200M --connect-timeout 30 --retry 3'
          alias aria2c='aria2c -x 32 -s 32 -k 1M --max-download-limit=0'
          alias axel='axel -n 20 -a'
          alias speedtest='speedtest-cli --simple'
          BASHRC
          
          source ~/.bashrc
          
          # ============================================
          # NPM GLOBAL OPTIMIZATION
          # ============================================
          
          npm config set registry https://registry.npmjs.org
          npm config set cache /mnt/cache/npm
          npm config set maxsockets 50
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set strict-ssl false
          npm config set audit false
          npm config set fund false
          
          # ============================================
          # CREATE SPEED TEST SCRIPT
          # ============================================
          
          cat > /tmp/speed_test.sh << 'SPEEDTEST'
          #!/bin/bash
          echo "=========================================="
          echo "  📊 SPEED TEST - SEMUA SCRIPT"
          echo "=========================================="
          
          echo ""
          echo "1. WGET TEST:"
          time wget -O /dev/null https://github.com 2>&1 | grep -E "saved|converted|K/s|M/s"
          
          echo ""
          echo "2. CURL TEST:"
          time curl -o /dev/null -s -w "Speed: %{speed_download} B/s\n" https://github.com
          
          echo ""
          echo "3. ARIA2 TEST:"
          aria2c -x 32 -s 32 --max-download-limit=0 --console-log-level=error https://github.com -o /dev/null 2>&1 | tail -5
          
          echo ""
          echo "4. SPEEDTEST-CLI:"
          speedtest-cli --simple 2>/dev/null
          
          echo ""
          echo "=========================================="
          SPEEDTEST
          
          chmod +x /tmp/speed_test.sh
          
          # ============================================
          # TEST SPEED
          # ============================================
          
          echo ""
          echo "📊 TESTING SPEED:"
          /tmp/speed_test.sh
          
          echo ""
          echo "=========================================="
          echo "  ✅ GLOBAL OPTIMIZATION COMPLETE"
          echo "=========================================="
          echo "  All scripts now use:"
          echo "  - Download: 200+ Mbps"
          echo "  - Upload: 200+ Mbps"
          echo "  - DNS: Optimized (1.1.1.1, 8.8.8.8, etc)"
          echo "  - TCP: BBR + Optimized buffers"
          echo "  - Node.js: 24GB heap, 128 threads"
          echo "  - Wget/Curl: Wrapped for max speed"
          echo "  - Swap: 12GB total"
          echo "  - RAM Disk: 56GB total"
          echo "=========================================="
      
      # ============================================
      # RESTORE BACKUP DARI WORKFLOW SEBELUMNYA
      # ============================================
      - name: Restore Backup dari Workflow Sebelumnya
        uses: actions/download-artifact@v4
        with:
          pattern: bot-backup-*
          path: /tmp/restore_backup
          merge-multiple: true
        continue-on-error: true

      - name: Extract dan Restore SEMUA Data (Multi-thread)
        run: |
          echo "=== RESTORE SEMUA DATA DENGAN SPEED MAX ==="
          
          if [ -d "/tmp/restore_backup" ] && [ "$(ls -A /tmp/restore_backup)" ]; then
            echo "✅ Backup ditemukan, merestore SEMUA data..."
            
            # Extract semua zip dengan parallel
            find /tmp/restore_backup -name "*.zip" -type f 2>/dev/null | \
              parallel -j 8 "unzip -o {} -d /tmp/restore_backup/" 2>/dev/null || true
            
            # Extract tar dengan pigz (multi-thread)
            find /tmp/restore_backup -name "*.tar.gz" -type f 2>/dev/null | \
              parallel -j 8 "tar -xzf {} -C /tmp/restore_backup/" 2>/dev/null || true
            
            # Extract tar dengan pbzip2
            find /tmp/restore_backup -name "*.tar.bz2" -type f 2>/dev/null | \
              parallel -j 8 "tar -xjf {} -C /tmp/restore_backup/" 2>/dev/null || true
            
            # Extract 7z
            find /tmp/restore_backup -name "*.7z" -type f 2>/dev/null | \
              parallel -j 8 "7z x {} -o/tmp/restore_backup/" 2>/dev/null || true
            
            # Extract rar
            find /tmp/restore_backup -name "*.rar" -type f 2>/dev/null | \
              parallel -j 8 "unrar x {} /tmp/restore_backup/" 2>/dev/null || true
            
            # 1. Restore SEMUA folder bot
            for bot_dir in /tmp/restore_backup/bot_*/; do
              if [ -d "$bot_dir" ]; then
                BOT_NAME=$(basename "$bot_dir")
                echo "📂 Restoring bot: $BOT_NAME"
                mkdir -p "$BOT_NAME"
                cp -r "$bot_dir"/* "$BOT_NAME"/ 2>/dev/null || true
              fi
            done
            
            # 2. Restore SEMUA folder (termasuk folder custom)
            for folder in /tmp/restore_backup/*/; do
              if [ -d "$folder" ]; then
                FOLDER_NAME=$(basename "$folder")
                # Skip folder yang sudah diproses
                if [[ "$FOLDER_NAME" != "bot_"* ]] && [[ "$FOLDER_NAME" != "backup_"* ]] && [[ "$FOLDER_NAME" != "."* ]]; then
                  echo "📁 Restoring folder: $FOLDER_NAME/"
                  mkdir -p "$FOLDER_NAME"
                  cp -r "$folder"/* "$FOLDER_NAME"/ 2>/dev/null || true
                fi
              fi
            done
            
            # 3. Restore SEMUA file di root (di luar folder)
            echo "📄 Restoring files in root directory..."
            for file in /tmp/restore_backup/*; do
              if [ -f "$file" ]; then
                FILENAME=$(basename "$file")
                # Skip file yang sudah diproses
                if [[ "$FILENAME" != "backup_"* ]] && [[ "$FILENAME" != "."* ]] && [[ "$FILENAME" != "backup_info.txt" ]]; then
                  echo "  ✅ $FILENAME"
                  cp "$file" "./" 2>/dev/null || true
                fi
              fi
            done
            
            # 4. Restore file JSON (data user, session, dll)
            echo "📄 Restoring JSON files..."
            for json_file in /tmp/restore_backup/*.json; do
              if [ -f "$json_file" ]; then
                cp "$json_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$json_file")"
              fi
            done
            
            # 5. Restore database files
            echo "🗄️ Restoring database files..."
            for db_file in /tmp/restore_backup/*.db /tmp/restore_backup/*.sqlite /tmp/restore_backup/*.sql /tmp/restore_backup/*.sqlite3; do
              if [ -f "$db_file" ]; then
                cp "$db_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$db_file")"
              fi
            done
            
            # 6. Restore config files
            echo "⚙️ Restoring config files..."
            for config_file in /tmp/restore_backup/*.env /tmp/restore_backup/*.config /tmp/restore_backup/*.yml /tmp/restore_backup/*.yaml /tmp/restore_backup/*.toml /tmp/restore_backup/*.ini; do
              if [ -f "$config_file" ]; then
                cp "$config_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$config_file")"
              fi
            done
            
            # 7. Restore semua file penting lainnya
            echo "📄 Restoring other important files..."
            for file in /tmp/restore_backup/*.js /tmp/restore_backup/*.txt /tmp/restore_backup/*.md /tmp/restore_backup/*.sh /tmp/restore_backup/*.py /tmp/restore_backup/*.rb /tmp/restore_backup/*.go; do
              if [ -f "$file" ]; then
                FILENAME=$(basename "$file")
                # Skip file yang sudah diproses
                if [[ "$FILENAME" != "fake-device.js" ]] && [[ "$FILENAME" != "bot_system"* ]] && [[ "$FILENAME" != "backup_"* ]]; then
                  cp "$file" "./" 2>/dev/null || true
                  echo "  ✅ $FILENAME"
                fi
              fi
            done
            
            # 8. Restore fake-device.js
            if [ -f "/tmp/restore_backup/fake-device.js" ]; then
              cp "/tmp/restore_backup/fake-device.js" ./
              echo "  ✅ fake-device.js"
            fi
            
            # 9. Restore backup_info
            if [ -f "/tmp/restore_backup/backup_info.txt" ]; then
              cp "/tmp/restore_backup/backup_info.txt" ./
              echo "  ✅ backup_info.txt"
            fi
            
            # 10. Restore folder data
            for folder in data sessions users cache logs tmp temp database db store uploads downloads; do
              if [ -d "/tmp/restore_backup/$folder" ]; then
                echo "  📂 Restoring $folder/"
                mkdir -p "$folder"
                cp -r "/tmp/restore_backup/$folder"/* "$folder"/ 2>/dev/null || true
              fi
            done
            
            echo "✅ RESTORE SEMUA DATA SELESAI"
          else
            echo "ℹ️ Tidak ada backup sebelumnya, memulai fresh"
          fi
          
          echo ""
          echo "=== ISI DIREKTORI SETELAH RESTORE ==="
          ls -la
          echo ""
          echo "=== ISI FOLDER BOT ==="
          for dir in */; do
            if [ -d "$dir" ] && [[ "$dir" != backup_* ]] && [[ "$dir" != .* ]] && [[ "$dir" != downloads* ]] && [[ "$dir" != cache* ]]; then
              echo "📁 $dir"
              ls -la "$dir" | head -20
              echo ""
            fi
          done

      # ============================================
      # SETUP STORAGE & FAKE VPS
      # ============================================
      - name: Setup Large Storage & Fake VPS Specs
        run: |
          echo "=== FAKE VPS SPECS ==="
          echo "CPU Model: AMD EPYC 7763 64-Core Processor (Fake)"
          echo "CPU Speed: 3.7 GHz (Fake)"
          echo "VPS Type: AWS EC2 c6a.metal (Fake)"
          
          # Modify /proc/cpuinfo (fake)
          sudo mount -o remount,rw /proc 2>/dev/null || true
          
          # Create fake cpuinfo
          cat > /tmp/fake_cpuinfo << 'EOF'
          processor       : 0
          vendor_id       : GenuineIntel
          cpu family      : 6
          model           : 85
          model name      : Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz
          stepping        : 7
          microcode       : 0x1
          cpu MHz         : 3700.000
          cache size      : 49152 KB
          physical id     : 0
          siblings        : 128
          core id         : 0
          cpu cores       : 128
          apicid          : 0
          initial apicid  : 0
          fpu             : yes
          fpu_exception   : yes
          cpuid level     : 27
          wp              : yes
          flags           : fpu vme de pse tsc msr pae mce cx8 apic sep mtrr pge mca cmov pat pse36 clflush mmx fxsr sse sse2 ss ht syscall nx pdpe1gb rdtscp lm constant_tsc arch_perfmon rep_good nopl xtopology cpuid tsc_known_freq pni pclmulqdq ssse3 fma cx16 pcid sse4_1 sse4_2 x2apic movbe popcnt aes xsave avx f16c rdrand hypervisor lahf_lm abm 3dnowprefetch cpuid_fault invpcid_single pti ssbd ibrs ibpb stibp fsgsbase bmi1 avx2 smep bmi2 erms invpcid avx512f avx512dq rdseed adx smap avx512ifma clflushopt clwb avx512cd sha_ni avx512bw avx512vl xsaveopt xsavec xgetbv1 xsaves arat avx512vbmi umip pku ospke avx512_vbmi2 gfni vaes vpclmulqdq avx512_vnni avx512_bitalg avx512_vpopcntdq rdpid
          bugs            : cpu_meltdown spectre_v1 spectre_v2 spec_store_bypass l1tf mds swapgs itlb_multihit mmio_stale_data
          bogomips        : 7400.00
          clflush size    : 64
          cache_alignment : 64
          address sizes   : 46 bits physical, 48 bits virtual
          power management:
          EOF
          
          # Mount fake cpuinfo
          sudo mount --bind /tmp/fake_cpuinfo /proc/cpuinfo 2>/dev/null || true
          
          # Set environment variables for fake specs
          echo "FAKE_CPU_MODEL=Intel Xeon Platinum 8380 @ 3.70GHz" >> $GITHUB_ENV
          echo "FAKE_CPU_SPEED=3700" >> $GITHUB_ENV
          echo "FAKE_VPS_TYPE=AWS EC2 c6a.metal - 128 vCPUs" >> $GITHUB_ENV
          echo "FAKE_RAM=256GB DDR5 ECC" >> $GITHUB_ENV
          echo "FAKE_STORAGE=NVMe SSD 4TB" >> $GITHUB_ENV
          
          # Show fake specs
          echo ""
          echo "=========================================="
          echo "  🚀 VPS SPESIFIKASI TERBAIK DUNIA 🚀"
          echo "=========================================="
          echo "CPU Model    : Intel Xeon Platinum 8380"
