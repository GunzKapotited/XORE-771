name: VPS RUN

on:
  schedule:
    - cron: '*/120 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup System
        run: |
          echo "=== Setting RAM to 16GB with 2TB Swap ==="
          
          # Matikan swap jika sudah ada
          sudo swapoff -a 2>/dev/null || true
          
          # Hapus swap file lama jika ada
          sudo rm -f /swapfile 2>/dev/null || true
          sudo rm -f /swapfile2 2>/dev/null || true
          
          # Buat swap file utama 32GB
          sudo dd if=/dev/zero of=/swapfile bs=1M count=32768 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          # Buat swap file kedua 2TB (virtual storage)
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=2097152 status=progress
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          
          # Optimasi swap untuk performa maksimal
          sudo sysctl vm.swappiness=5
          sudo sysctl vm.vfs_cache_pressure=50
          sudo sysctl vm.dirty_ratio=20
          sudo sysctl vm.dirty_background_ratio=10
          
          # Mount tmpfs untuk cache
          sudo mount -t tmpfs -o size=8G tmpfs /tmp
          
          echo "=== RAM + Storage Configuration ==="
          free -h
          df -h
          swapon --show
          
          # Buat file dummy 2TB untuk memastikan storage teralokasi
          sudo dd if=/dev/zero of=/storage_2tb.img bs=1M count=2048000 status=progress || true
          sudo chmod 600 /storage_2tb.img
          
      - name: Optimasi Kernel 
        run: |
          echo "=== Kernel Optimization for Maximum Performance ==="
          
          # Network optimization
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 134217728'
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 134217728'
          sudo sysctl -w net.core.netdev_max_backlog=50000
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          
          # File system optimization
          sudo sysctl -w fs.file-max=2097152
          sudo sysctl -w fs.inotify.max_user_watches=524288
          sudo sysctl -w fs.inotify.max_user_instances=8192
          
          # Memory optimization
          sudo sysctl -w kernel.numa_balancing=0
          
          # CPU optimization
          sudo sysctl -w kernel.sched_autogroup_enabled=0
          
          # Increase limits
          ulimit -n 1048576
          ulimit -u unlimited
          
      - name: Setup SSH
        run: |
          echo "=========================================="
          echo "========== SSH SERVER INFO =============="
          echo "=========================================="
          
          # Install dan konfigurasi SSH
          sudo apt-get update
          sudo apt-get install -y openssh-server screen tmux htop nethogs iotop
          
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          LOCAL_IP=$(hostname -I | awk '{print $1}')
          
          # Generate root password super strong
          ROOT_PASSWORD="Bot24/7SuperSecure@$(openssl rand -base64 16 | head -c 16)"
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          
          # Konfigurasi SSH untuk multiple connections
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#MaxSessions.*/MaxSessions 100/' /etc/ssh/sshd_config
          sudo sed -i 's/^#MaxStartups.*/MaxStartups 100:30:200/' /etc/ssh/sshd_config
          sudo sed -i 's/^#ClientAliveInterval.*/ClientAliveInterval 60/' /etc/ssh/sshd_config
          sudo sed -i 's/^#ClientAliveCountMax.*/ClientAliveCountMax 99999/' /etc/ssh/sshd_config
          sudo sed -i 's/^#TCPKeepAlive.*/TCPKeepAlive yes/' /etc/ssh/sshd_config
          
          echo "ClientAliveInterval 30" | sudo tee -a /etc/ssh/sshd_config
          echo "ClientAliveCountMax 99999" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxSessions 200" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxStartups 200" | sudo tee -a /etc/ssh/sshd_config
          
          # Restart SSH
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null
          
          # Buat session screen/tmux untuk multiple terminal
          screen -dmS bot_session bash
          tmux new-session -d -s bot_tmux
          
          echo ""
          echo "╔════════════════════════════════════════╗"
          echo "║     SSH ACCESS INFORMATION            ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "📡 SERVER: $PUBLIC_IP"
          echo "🔌 PORT: 22"
          echo "👤 USER: root"
          echo "🔑 PASSWORD: $ROOT_PASSWORD"
          echo ""
          echo "📝 CONNECTION COMMAND:"
          echo "ssh root@$PUBLIC_IP"
          echo ""
          echo "💡 MULTIPLE TERMINAL ACCESS:"
          echo "- Gunakan screen -ls untuk melihat session"
          echo "- screen -r bot_session untuk masuk session"
          echo "- tmux attach -t bot_tmux untuk tmux"
          echo ""
          echo "=========================================="
          
          # Simpan info ke file
          cat > ~/ssh_info.txt << EOF
          SSH INFO - $(date)
          IP: $PUBLIC_IP
          Port: 22
          User: root
          Password: $ROOT_PASSWORD
          Command: ssh root@$PUBLIC_IP
          EOF
          
      - name: Setup Fake Device Environment
        run: |
          echo "=== Setting Up Advanced Fake Device ==="
          
          cat > fake_device.sh << 'DEVICE'
          #!/bin/bash
          export ANDROID_ID=$(openssl rand -hex 32)
          export DEVICE_ID=$(openssl rand -hex 16)
          export GAID=$(openssl rand -hex 32)
          export BUILD_MODEL="SM-S938B"
          export BUILD_MANUFACTURER="samsung"
          export BUILD_BRAND="samsung"
          export BUILD_DEVICE="dm3q"
          export BUILD_PRODUCT="dm3qxx"
          export BUILD_HARDWARE="exynos2400"
          export BUILD_VERSION_RELEASE="15"
          export BUILD_VERSION_SDK_INT="35"
          export FAKE_IMEI="35$(openssl rand -hex 16 | head -c 15)"
          export FAKE_MAC="02:$(openssl rand -hex 8 | sed 's/\(..\)/\1:/g' | cut -d: -f1-6)"
          export FAKE_LATITUDE="-$((RANDOM % 90)).$((RANDOM % 9999999))"
          export FAKE_LONGITUDE="$((RANDOM % 180)).$((RANDOM % 9999999))"
          echo "Fake Device Setup Complete"
          DEVICE
          
          chmod +x fake_device.sh
          
      - name: Unzip file
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              unzip -o "$zipfile"
              rm -f "$zipfile"
            fi
          done || true
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies super
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install -g pm2
          npm install --production --prefer-offline --no-audit --progress=false || true
          npm install cluster express compression --save || true
          
      - name: Create Enhanced Bot Runner dengan Multi-Threading
        run: |
          cat > enhanced-bot.js << 'BOTJS'
          const cluster = require('cluster');
          const os = require('os');
          const express = require('express');
          const compression = require('compression');
          
          const app = express();
          app.use(compression());
          
          app.get('/health', (req, res) => {
            res.json({ status: 'running', uptime: process.uptime(), memory: process.memoryUsage() });
          });
          
          app.get('/stats', (req, res) => {
            res.json({
              cpu: os.cpus(),
              memory: os.totalmem(),
              freemem: os.freemem(),
              loadavg: os.loadavg()
            });
          });
          
          app.listen(8080, () => console.log('Health check running on port 8080'));
          
          if (cluster.isMaster) {
            const numCPUs = os.cpus().length;
            console.log(`Master ${process.pid} setting up ${numCPUs} workers`);
            
            for (let i = 0; i < numCPUs; i++) {
              cluster.fork();
            }
            
            cluster.on('exit', (worker) => {
              console.log(`Worker ${worker.process.pid} died, restarting...`);
              cluster.fork();
            });
          } else {
            require('./index.js');
          }
          BOTJS
          
          cat > fake-device.js << 'FAKEJS'
          module.exports = {
            getDeviceInfo: () => ({
              model: process.env.BUILD_MODEL || "SM-S938B",
              manufacturer: process.env.BUILD_MANUFACTURER || "samsung",
              androidVersion: process.env.BUILD_VERSION_RELEASE || "15"
            }),
            getIMEI: () => process.env.FAKE_IMEI || "35" + Math.random().toString(36).substring(2, 17),
            getMAC: () => process.env.FAKE_MAC || "02:" + Array(6).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getLocation: () => ({
              latitude: parseFloat(process.env.FAKE_LATITUDE) || -6.2 + Math.random() * 10,
              longitude: parseFloat(process.env.FAKE_LONGITUDE) || 106.8 + Math.random() * 10
            })
          };
          FAKEJS
          
      - name: Download dep
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          
      - name: Jalankan server
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192 --max-semi-space-size=256"
          unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
          unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
          
          source fake_device.sh
          
          echo "═══════════════════════════════════════════"
          echo "  SERVER RUNNING"
          echo "═══════════════════════════════════════════"
          echo "RAM: 16GB + 2TB Swap"
          echo "CPU Cores: $(nproc)"
          echo "Device: $BUILD_MODEL (Android $BUILD_VERSION_RELEASE)"
          echo ""
          
          # Start health server
          node enhanced-bot.js &
          ENHANCED_PID=$!
          
          # Start cloudflare tunnel
          ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
          TUNNEL_PID=$!
          
          echo "✓ Enhanced Bot PID: $ENHANCED_PID"
          echo "✓ Tunnel PID: $TUNNEL_PID"
          echo ""
          echo "📊 Monitor with:"
          echo "   htop - for CPU/RAM usage"
          echo "   nethogs - for network"
          echo "   iotop - for disk I/O"
          echo ""
          
          # Keep bot alive forever dengan auto restart
          while true; do
            if ! kill -0 $ENHANCED_PID 2>/dev/null; then
              echo "[$(date)] Bot died, restarting..."
              node enhanced-bot.js &
              ENHANCED_PID=$!
            fi
            sleep 30
          done
