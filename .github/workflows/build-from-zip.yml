name: Build APK from ZIP

on:
  push:
    paths:
      - '*.zip'  # Jalanin workflow kalo ada file ZIP baru

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          # Cari file ZIP pertama
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            unzip -q "$ZIP_FILE" -d extracted_project
            # Pindahkan semua isi ke root
            cp -r extracted_project/*/* extracted_project/ 2>/dev/null || true
            cp -r extracted_project/* ./
            rm -rf extracted_project
            echo "✅ ZIP extracted successfully"
          else
            echo "❌ No ZIP file found"
            exit 1
          fi
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
