name: Build APK from ZIP

on:
  push:
    paths:
      - '*.zip'  # Workflow berjalan saat ada file ZIP baru

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Ekstrak file ZIP
      - name: Extract ZIP
        run: |
          unzip -q *.zip -d extracted_project
          cd extracted_project
          # Pindahkan semua isi ke root (opsional)
          mv * ../
          cd ..
          rm -rf extracted_project *.zip
      
      # Setup Java
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      # Build APK
      - run: flutter pub get
      - run: flutter build apk --release
      
      # Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
